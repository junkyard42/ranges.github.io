<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Playbook Pro - Ultimate Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #121212; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .container { background: #1e1e1e; padding: 15px; border-radius: 12px; width: 100%; max-width: 500px; box-sizing: border-box; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; background: #2a2a2a; padding: 5px; border-radius: 8px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 13px; color: #888; }
        .tab.active { background: #3498db; color: white; }
        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        select { width: 100%; padding: 10px; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 6px; font-size: 13px; }
        .quick-presets button { border: none; border-radius: 4px; font-size: 10px; cursor: pointer; padding: 8px; font-weight: bold; }
        
        /* Couleurs Actions */
        .fold { background: #2a2a2a; color: #555; }
        .action-l-fold { background: #34495e; color: white; } .action-l-call { background: #16a085; color: white; }
        .action-l-3bet { background: #d35400; color: white; } .action-l-ai { background: #c0392b; color: white; }
        .action-o-fold { background: #3498db; color: white; } .action-o-call { background: #2ecc71; color: white; }
        .action-o-4bet { background: #f39c12; color: white; } .action-o-ai { background: #9b59b6; color: white; }
        .action-blue { background: #3498db; color: white; } .action-green { background: #2ecc71; color: white; }
        .action-orange { background: #f39c12; color: white; } .action-purple { background: #9b59b6; color: white; }

        .palette { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; margin: 10px 0; }
        .palette.sb-mode { grid-template-columns: repeat(3, 1fr); }
        .tool { padding: 10px 2px; border-radius: 5px; cursor: pointer; border: 2px solid transparent; font-weight: bold; font-size: 9px; text-align: center; }
        .tool.active { border-color: white; }
        .grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 2px; }
        .cell { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; cursor: pointer; border-radius: 2px; border: 1px solid rgba(255,255,255,0.03); }
        #statsPanel { display: flex; gap: 10px; margin-bottom: 10px; }
        .stat-box { flex: 1; background: #2a2a2a; padding: 10px; border-radius: 8px; text-align: center; }
        #quizSection { display:none; background: #2c3e50; padding: 15px; border-radius: 10px; text-align: center; margin-top: 15px; }
        #login-overlay { position: fixed; inset: 0; background: #121212; display: flex; align-items: center; justify-content: center; z-index: 100; flex-direction: column; gap: 10px; }
        input { padding: 12px; border-radius: 6px; border: 1px solid #333; width: 250px; background: #1e1e1e; color: white; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h2>Poker Playbook Pro</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Mot de passe">
        <button onclick="signIn()" style="padding: 12px 100px; background: #3498db; border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: bold;">Connexion</button>
    </div>

    <div class="container">
        <div class="tabs">
            <div class="tab active" id="tab-RFI" onclick="switchTab('RFI')">MON OPEN (RFI)</div>
            <div class="tab" id="tab-DEFENSE" onclick="switchTab('DEFENSE')">DÉFENSE</div>
        </div>

        <div class="controls">
            <select id="stackSelect" onchange="refreshData()">
                <option value="100">100 BB</option><option value="40">40 BB</option><option value="20">20 BB</option><option value="14">14 BB</option>
            </select>

            <div class="quick-presets" style="display: flex; gap: 5px; flex-wrap: wrap;">
                <button onclick="applyPreset('RFI', 'BTN', 'ANY')" style="background: #2980b9; color: white;">RFI BTN</button>
                <button onclick="applyPreset('DEFENSE', 'BB', 'SB_LIMP')" style="background: #8e44ad; color: white;">BB vs SB LIMP</button>
                <button onclick="applyPreset('DEFENSE', 'SB', 'BTN')" style="background: #34495e; color: white;">SB vs BTN</button>
            </div>

            <select id="posSelect" onchange="updateVsPosOptions(); refreshData();">
                <option value="UTG">UTG</option><option value="CO">CO</option><option value="BTN">BTN</option><option value="SB" selected>SB</option><option value="BB">BB</option>
            </select>
            <div id="vsPosContainer" style="display:none;"><select id="vsPosSelect" onchange="refreshData();"></select></div>

            <div style="display: flex; gap: 10px;">
                <button onclick="copyRange()" style="flex: 1; padding: 8px; background: #444; color: white; border: none; border-radius: 4px; font-size: 11px; cursor: pointer;">📋 Copier</button>
                <button id="pasteBtn" onclick="pasteRange()" style="flex: 1; padding: 8px; background: #27ae60; color: white; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; display: none;">📥 Coller</button>
            </div>
        </div>

        <div id="statsPanel">
            <div class="stat-box" style="border-bottom: 3px solid #3498db;"><span style="font-size:10px; color:#888;">VPIP</span><br><b id="statVPIP">0%</b></div>
            <div class="stat-box" style="border-bottom: 3px solid #e74c3c;"><span style="font-size:10px; color:#888;">PFR</span><br><b id="statPFR">0%</b></div>
        </div>

        <div class="palette" id="palette"></div>
        <div id="pokerGrid" class="grid"></div>

        <button onclick="toggleQuiz()" style="margin-top:15px; width:100%; padding:12px; background:#f1c40f; border:none; font-weight:bold; cursor:pointer; border-radius:6px;">🎓 TESTER MES CONNAISSANCES</button>

        <div id="quizSection">
            <div style="font-size:11px; margin-bottom:10px;">Q: <span id="qCount">1</span>/20 | Score: <span id="qScore">0</span></div>
            <h2 id="quizHand" style="font-size:32px; color:#f1c40f; margin:10px 0;">??</h2>
            <div id="quizOptions" class="palette"></div>
            <button onclick="toggleQuiz()" style="background:none; color:#ccc; border:none; cursor:pointer; font-size:10px; margin-top:10px;">Arrêter</button>
        </div>
    </div>

    <script>
        const S_URL = 'https://mvncrfuuleirfainulqw.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12bmNyZnV1bGVpcmZhaW51bHF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNjY1MzQsImV4cCI6MjA4OTg0MjUzNH0.VnE7ttFDJmx5eb6oT3UBw-BvxRM_yuGT99vUocmehR0';
        const sbClient = supabase.createClient(S_URL, S_KEY);
        const ranks = ['A', 'K', 'Q', 'J', 'T', '9', '8', '7', '6', '5', '4', '3', '2'];
        let currentTab = 'RFI', currentAction = 'fold', quizActive = false, score = 0, qDone = 0, correctAction = "", copiedData = null;

        const actionsSB = [
            { id: 'fold', label: 'FOLD', class: 'fold' },
            { id: 'action-l-fold', label: 'L-FOLD', class: 'action-l-fold' }, { id: 'action-o-fold', label: 'O-FOLD', class: 'action-o-fold' },
            { id: 'action-l-call', label: 'L-CALL', class: 'action-l-call' }, { id: 'action-o-call', label: 'O-CALL', class: 'action-o-call' },
            { id: 'action-l-3bet', label: 'L-3BET', class: 'action-l-3bet' }, { id: 'action-o-4bet', label: 'O-4BET', class: 'action-o-4bet' },
            { id: 'action-l-ai', label: 'L-AI', class: 'action-l-ai' }, { id: 'action-o-ai', label: 'O-AI', class: 'action-o-ai' }
        ];

        const actionsStd = [
            { id: 'fold', label: 'FOLD', class: 'fold' },
            { id: 'action-blue', label: 'RAISE/FOLD', class: 'action-blue' }, { id: 'action-green', label: 'RAISE/CALL', class: 'action-green' },
            { id: 'action-orange', label: '3/4-BET', class: 'action-orange' }, { id: 'action-purple', label: 'ALL-IN', class: 'action-purple' }
        ];

        const grid = document.getElementById('pokerGrid');
        for (let i = 0; i < 13; i++) {
            for (let j = 0; j < 13; j++) {
                let hand = (i < j) ? ranks[i]+ranks[j]+"s" : (i > j) ? ranks[j]+ranks[i]+"o" : ranks[i]+ranks[j];
                const cell = document.createElement('div');
                cell.className = 'cell fold'; cell.textContent = hand; cell.dataset.hand = hand;
                cell.onclick = () => { if(!quizActive) { cell.className = 'cell ' + currentAction; updateHand(hand, currentAction); updateStats(); } };
                grid.appendChild(cell);
            }
        }

        function updatePalette(targetId, isQuiz = false) {
            const pos = document.getElementById('posSelect').value;
            const container = document.getElementById(targetId);
            container.innerHTML = '';
            const useSB = (pos === 'SB' && currentTab === 'RFI');
            const list = useSB ? actionsSB : actionsStd;
            container.className = useSB ? 'palette sb-mode' : 'palette';

            list.forEach(a => {
                const btn = document.createElement('div');
                btn.className = `tool ${a.class} ${!isQuiz && currentAction === a.id ? 'active' : ''}`;
                btn.innerText = a.label;
                btn.onclick = () => isQuiz ? checkQuiz(a.id) : setAction(a.id, btn);
                container.appendChild(btn);
            });
        }

        function setAction(id, btn) {
            currentAction = id;
            document.querySelectorAll('#palette .tool').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
        }

        async function refreshData() {
            updatePalette('palette');
            const pos = document.getElementById('posSelect').value;
            const stack = document.getElementById('stackSelect').value;
            const vsPos = (currentTab === 'DEFENSE') ? document.getElementById('vsPosSelect').value : 'ANY';
            document.querySelectorAll('.cell').forEach(c => c.className = 'cell fold');
            const { data } = await sbClient.from('ranges').select('*').eq('position', pos).eq('situation', currentTab).eq('vs_position', vsPos).eq('stack_depth', parseInt(stack));
            if (data) data.forEach(row => { 
                const cell = document.querySelector(`[data-hand="${row.hand}"]`);
                if (cell) cell.className = 'cell ' + row.action;
            });
            updateStats();
        }

        function copyRange() {
            copiedData = Array.from(document.querySelectorAll('.cell'))
                .filter(c => !c.classList.contains('fold'))
                .map(c => ({ hand: c.dataset.hand, action: Array.from(c.classList).find(cls => cls.startsWith('action-')) }));
            document.getElementById('pasteBtn').style.display = 'block';
        }

        async function pasteRange() {
            if(!copiedData || !confirm("Écraser ?")) return;
            const { data: { user } } = await sbClient.auth.getUser();
            const upserts = copiedData.map(d => ({
                user_id: user.id, hand: d.hand, action: d.action,
                position: document.getElementById('posSelect').value, situation: currentTab,
                vs_position: (currentTab === 'DEFENSE') ? document.getElementById('vsPosSelect').value : 'ANY',
                stack_depth: parseInt(document.getElementById('stackSelect').value)
            }));
            await sbClient.from('ranges').upsert(upserts);
            refreshData();
        }

        function applyPreset(sit, pos, vs) {
            currentTab = sit;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + sit).classList.add('active');
            document.getElementById('posSelect').value = pos;
            updateVsPosOptions();
            document.getElementById('vsPosContainer').style.display = (sit === 'DEFENSE') ? 'block' : 'none';
            document.getElementById('vsPosSelect').value = vs;
            refreshData();
        }

        function toggleQuiz() {
            quizActive = !quizActive;
            document.getElementById('quizSection').style.display = quizActive ? 'block' : 'none';
            document.getElementById('pokerGrid').style.display = quizActive ? 'none' : 'grid';
            if(quizActive) { score = 0; qDone = 0; updatePalette('quizOptions', true); nextQuiz(); }
        }

        function nextQuiz() {
            if (qDone >= 20) { alert(`Score: ${score}/20`); toggleQuiz(); return; }
            const all = Array.from(document.querySelectorAll('.cell'));
            const randomCell = all[Math.floor(Math.random() * all.length)];
            document.getElementById('quizHand').innerText = randomCell.dataset.hand;
            correctAction = Array.from(randomCell.classList).find(c => c.startsWith('action-')) || 'fold';
            document.getElementById('qCount').innerText = qDone + 1;
            document.getElementById('qScore').innerText = score;
        }

        function checkQuiz(choice) {
            if(choice === correctAction) score++;
            else alert("Faux !");
            qDone++; nextQuiz();
        }

        function updateStats() {
            let total = 0, played = 0, pfr = 0;
            document.querySelectorAll('.cell').forEach(c => {
                let w = c.dataset.hand.includes('s') ? 4 : (c.dataset.hand.includes('o') ? 12 : 6);
                total += w;
                if(!c.classList.contains('fold')) played += w;
                if(c.className.includes('-o-') || c.className.includes('orange') || c.className.includes('purple')) pfr += w;
            });
            document.getElementById('statVPIP').innerText = (played/total*100).toFixed(1) + "%";
            document.getElementById('statPFR').innerText = (pfr/total*100).toFixed(1) + "%";
        }

        async function updateHand(hand, action) {
            const { data: { user } } = await sbClient.auth.getUser();
            if (!user) return;
            await sbClient.from('ranges').upsert({ user_id: user.id, hand, action, position: document.getElementById('posSelect').value, situation: currentTab, vs_position: (currentTab === 'DEFENSE') ? document.getElementById('vsPosSelect').value : 'ANY', stack_depth: parseInt(document.getElementById('stackSelect').value) });
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('vsPosContainer').style.display = (tab === 'DEFENSE') ? 'block' : 'none';
            updateVsPosOptions();
            refreshData();
        }

        function updateVsPosOptions() {
            const POS = ["UTG", "CO", "BTN", "SB", "BB"];
            const myPos = document.getElementById('posSelect').value;
            const myIndex = POS.indexOf(myPos);
            let html = POS.slice(0, myIndex).map(p => `<option value="${p}">${p}</option>`).join('');
            if(myPos === 'BB') html += `<option value="SB_LIMP">SB LIMP</option>`;
            document.getElementById('vsPosSelect').innerHTML = html || '<option value="ANY">ANY</option>';
        }

        async function signIn() {
            const { error } = await sbClient.auth.signInWithPassword({ email: document.getElementById('email').value, password: document.getElementById('password').value });
            if (error) alert(error.message);
        }

        sbClient.auth.onAuthStateChange((event, session) => { if (session) { document.getElementById('login-overlay').style.display = 'none'; updateVsPosOptions(); refreshData(); } });
    </script>
</body>
</html>
