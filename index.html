<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Range Cloud v2</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #121212; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .container { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 100%; max-width: 550px; box-sizing: border-box; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        
        /* Sélecteur de position */
        .pos-header { margin-bottom: 15px; }
        select { width: 100%; padding: 12px; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 6px; font-weight: bold; font-size: 14px; outline: none; cursor: pointer; }
        
        .grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 2px; margin: 15px 0; }
        .cell { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: clamp(7px, 2vw, 10px); font-weight: 700; cursor: pointer; border-radius: 2px; user-select: none; border: 1px solid rgba(255,255,255,0.03); }
        
        .fold { background: #2a2a2a; color: #555; }
        .open-fold { background: #3498db; color: white; }
        .open-call { background: #2ecc71; color: white; }
        .open-4bet { background: #e74c3c; color: white; }

        .palette { display: flex; gap: 5px; margin-bottom: 10px; }
        .tool { flex: 1; padding: 10px 5px; border-radius: 5px; cursor: pointer; border: 2px solid transparent; font-weight: bold; font-size: 11px; text-align: center; transition: 0.2s; }
        .tool.active { border-color: white; transform: translateY(-2px); }
        
        #login-overlay { position: fixed; inset: 0; background: #121212; display: flex; align-items: center; justify-content: center; z-index: 100; flex-direction: column; gap: 15px; }
        input { padding: 12px; border-radius: 6px; border: 1px solid #333; width: 280px; background: #1e1e1e; color: white; }
        .btn-main { padding: 12px 24px; background: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 280px; }
        .status { font-size: 12px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h2 style="margin-bottom: 5px;">Accès Restreint</h2>
        <p style="color: #666; font-size: 13px; margin-bottom: 10px;">Connectez-vous pour gérer vos ranges</p>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Mot de passe">
        <button class="btn-main" onclick="signIn()">Se connecter</button>
    </div>

    <div class="container">
        <div class="pos-header">
            <select id="positionSelect" onchange="changePosition()">
                <option value="UTG">UTG (Under The Gun)</option>
                <option value="HJ">HJ (Hijack)</option>
                <option value="CO">CO (Cut-Off)</option>
                <option value="BTN">BTN (Button)</option>
                <option value="SB">SB (Small Blind)</option>
            </select>
        </div>

        <div class="palette">
            <div class="tool fold active" data-action="fold" style="background: #2a2a2a; color: #555;">FOLD</div>
            <div class="tool open-fold" data-action="open-fold" style="background: #3498db;">O-FOLD</div>
            <div class="tool open-call" data-action="open-call" style="background: #2ecc71;">O-CALL</div>
            <div class="tool open-4bet" data-action="open-4bet" style="background: #e74c3c;">4BET/AI</div>
        </div>

        <div id="pokerGrid" class="grid"></div>
        <div id="status" class="status">Initialisation...</div>
        <button onclick="signOut()" style="margin-top: 15px; background: none; border: 1px solid #444; color: #888; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 11px; width: 100%;">Déconnexion</button>
    </div>

    <script>
        const S_URL = 'https://mvncrfuuleirfainulqw.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12bmNyZnV1bGVpcmZhaW51bHF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNjY1MzQsImV4cCI6MjA4OTg0MjUzNH0.VnE7ttFDJmx5eb6oT3UBw-BvxRM_yuGT99vUocmehR0';
        const sbClient = supabase.createClient(S_URL, S_KEY);

        const ranks = ['A', 'K', 'Q', 'J', 'T', '9', '8', '7', '6', '5', '4', '3', '2'];
        let currentAction = 'fold';
        let currentPosition = 'UTG';

        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await sbClient.auth.signInWithPassword({ email, password });
            if (error) alert("Accès refusé : Identifiants incorrects.");
        }

        async function signOut() {
            await sbClient.auth.signOut();
            location.reload();
        }

        async function changePosition() {
            currentPosition = document.getElementById('positionSelect').value;
            document.querySelectorAll('.cell').forEach(c => c.className = 'cell fold');
            await loadData();
        }

        async function loadData() {
            document.getElementById('status').innerText = "Synchronisation Cloud...";
            const { data, error } = await sbClient.from('ranges').select('*').eq('position', currentPosition);
            if (data) {
                data.forEach(row => {
                    const cell = document.querySelector(`[data-hand="${row.hand}"]`);
                    if (cell) cell.className = 'cell ' + row.action;
                });
                document.getElementById('status').innerText = `Position ${currentPosition} à jour.`;
            }
        }

        async function updateHand(hand, action) {
            const { data: { user } } = await sbClient.auth.getUser();
            if (!user) return;
            await sbClient.from('ranges').upsert({ 
                user_id: user.id, hand: hand, action: action, position: currentPosition 
            }, { onConflict: 'user_id,hand,position' });
        }

        const grid = document.getElementById('pokerGrid');
        for (let i = 0; i < 13; i++) {
            for (let j = 0; j < 13; j++) {
                let hand = (i < j) ? ranks[i]+ranks[j]+"s" : (i > j) ? ranks[j]+ranks[i]+"o" : ranks[i]+ranks[j];
                const cell = document.createElement('div');
                cell.className = 'cell fold';
                cell.textContent = hand;
                cell.dataset.hand = hand;
                cell.onclick = () => {
                    cell.className = 'cell ' + currentAction;
                    updateHand(hand, currentAction);
                };
                grid.appendChild(cell);
            }
        }

        document.querySelectorAll('.tool').forEach(tool => {
            tool.addEventListener('click', () => {
                document.querySelectorAll('.tool').forEach(t => t.classList.remove('active'));
                tool.classList.add('active');
                currentAction = tool.dataset.action;
            });
        });

        sbClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('login-overlay').style.display = 'none';
                loadData();
            }
        });
    </script>
</body>
</html>
