<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Playbook Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #121212; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .container { background: #1e1e1e; padding: 15px; border-radius: 12px; width: 100%; max-width: 500px; box-sizing: border-box; }
        
        /* Onglets */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; background: #2a2a2a; padding: 5px; border-radius: 8px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 13px; color: #888; }
        .tab.active { background: #3498db; color: white; }

        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        select { width: 100%; padding: 10px; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 6px; font-size: 13px; }

        .grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 2px; }
        .cell { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; cursor: pointer; border-radius: 2px; border: 1px solid rgba(255,255,255,0.03); }
        
        /* Couleurs Dynamiques */
        .fold { background: #2a2a2a; color: #555; }
        .action-blue { background: #3498db; color: white; } /* Open-Fold OU Fold */
        .action-green { background: #2ecc71; color: white; } /* Open-Call OU Call */
        .action-orange { background: #f39c12; color: white; } /* 3-BET / 4-BET */
        .action-purple { background: #9b59b6; color: white; } /* ALL-IN */

        .palette { display: flex; gap: 5px; margin: 15px 0; }
        .tool { flex: 1; padding: 12px 5px; border-radius: 5px; cursor: pointer; border: 2px solid transparent; font-weight: bold; font-size: 10px; text-align: center; }
        .tool.active { border-color: white; }
        
        #login-overlay { position: fixed; inset: 0; background: #121212; display: flex; align-items: center; justify-content: center; z-index: 100; flex-direction: column; gap: 15px; }
        input { padding: 12px; border-radius: 6px; border: 1px solid #333; width: 250px; background: #1e1e1e; color: white; }
        .status { font-size: 11px; color: #666; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h2>Poker Vault</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Mot de passe">
        <button onclick="signIn()" style="padding: 12px 250px; background: #3498db; border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: bold;">Connexion</button>
    </div>

    <div class="container">
        <div class="tabs">
            <div class="tab active" id="tab-RFI" onclick="switchTab('RFI')">MON OPEN (RFI)</div>
            <div class="tab" id="tab-DEFENSE" onclick="switchTab('DEFENSE')">DÉFENSE (Vs RFI)</div>
        </div>

        <div class="controls">
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <label style="font-size: 11px; color: #f39c12; font-weight: bold;">TAILLE DU STACK</label>
                <select id="stackSelect" onchange="refreshData()" style="border-color: #f39c12;">
                    <option value="100">100 BB</option>
                    <option value="80">80 BB</option>
                    <option value="60">60 BB</option>
                    <option value="40">40 BB</option>
                    <option value="30">30 BB</option>
                    <option value="20">20 BB</option>
                    <option value="14">14 BB</option>
                    <option value="10">10 BB</option>
                </select>
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <label style="font-size: 11px; color: #888;">MA POSITION</label>
                <select id="posSelect" onchange="refreshData()">
                    <option value="UTG">UTG</option>
                    <option value="UTG+1">UTG+1</option>
                    <option value="MP">MP</option>
                    <option value="HJ">HJ</option>
                    <option value="CO">CO</option>
                    <option value="BTN">BTN</option>
                    <option value="SB">SB</option>
                    <option value="BB">BB</option>
                </select>
            </div>

            <div id="vsPosContainer" style="display: none; flex-direction: column; gap: 5px;">
                <label style="font-size: 11px; color: #e74c3c; font-weight: bold;">VS OPEN DE :</label>
                <select id="vsPosSelect" onchange="refreshData()">
                    <option value="UTG">UTG</option>
                    <option value="UTG+1">UTG+1</option>
                    <option value="MP">MP</option>
                    <option value="HJ">HJ</option>
                    <option value="CO">CO</option>
                    <option value="BTN">BTN</option>
                    <option value="SB">SB</option>
                </select>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button onclick="copyCurrentRange()" style="flex: 1; padding: 8px; background: #444; color: #fff; border: 1px solid #666; border-radius: 4px; font-size: 11px; cursor: pointer;">
                    📋 Copier cette range
                </button>
                <button id="pasteBtn" onclick="pasteRange()" style="flex: 1; padding: 8px; background: #27ae60; color: #fff; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; display: none;">
                    📥 Coller ici
                </button>
            </div>
        </div>

        <div class="palette" id="palette">
            <div class="tool fold active" data-action="fold">FOLD</div>
            <div class="tool action-blue" id="btn-blue" data-action="action-blue">O-FOLD</div>
            <div class="tool action-green" id="btn-green" data-action="action-green">O-CALL</div>
            <div class="tool action-orange" id="btn-orange" data-action="action-orange">3/4-BET</div>
            <div class="tool action-purple" id="btn-purple" data-action="action-purple">ALL-IN</div>
        </div>

        <div id="statsPanel" style="display: flex; gap: 10px; margin-bottom: 10px; width: 100%;">
            <div style="flex: 1; background: #2a2a2a; padding: 10px; border-radius: 8px; text-align: center; border-bottom: 3px solid #3498db;">
                <span style="display: block; font-size: 10px; color: #888; text-transform: uppercase;">Fréquence Jouée</span>
                <span id="statVPIP" style="font-size: 18px; font-weight: bold; color: white;">0.0%</span>
            </div>
            <div style="flex: 1; background: #2a2a2a; padding: 10px; border-radius: 8px; text-align: center; border-bottom: 3px solid #e74c3c;">
                <span style="display: block; font-size: 10px; color: #888; text-transform: uppercase;">Fréquence Aggro</span>
                <span id="statPFR" style="font-size: 18px; font-weight: bold; color: white;">0.0%</span>
            </div>
        </div>

        <div id="pokerGrid" class="grid"></div>
        <div id="status" class="status">Connecté</div>
        <button onclick="resetCurrentRange()" style="flex: 0.5; padding: 10px; background: #c0392b; border: none; color: white; border-radius: 6px; font-size: 11px;">🗑️ Reset</button>

        <div id="quizSection" style="display:none; background: #2c3e50; padding: 15px; border-radius: 10px; text-align: center; margin-top: 20px; transition: background 0.3s;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 12px; color: #bdc3c7;">
                <span>Question : <b id="quizCount">1</b> / 20</span>
                <span>Score : <b id="quizScore">0</b> / 20</span>
            </div>
            
            <div style="width: 100%; height: 4px; background: #34495e; border-radius: 2px; margin-bottom: 15px;">
                <div id="quizProgress" style="width: 0%; height: 100%; background: #f1c40f; border-radius: 2px; transition: width 0.3s;"></div>
            </div>
        
            <h3 style="margin: 10px 0;">Action pour : <span id="quizHand" style="color: #f1c40f; font-size: 28px;">??</span></h3>
            
            <div style="display: flex; gap: 5px; margin-top: 15px; flex-wrap: wrap;">
                <button onclick="checkQuiz('fold')" style="flex:1; padding: 12px; background: #2a2a2a; color: white; border-radius: 5px; border: 1px solid #444;">FOLD</button>
                <button onclick="checkQuiz('action-blue')" id="q-blue" style="flex:1; padding: 12px; background: #3498db; color: white; border-radius: 5px; border: none;">...</button>
                <button onclick="checkQuiz('action-green')" id="q-green" style="flex:1; padding: 12px; background: #2ecc71; color: white; border-radius: 5px; border: none;">...</button>
                <button onclick="checkQuiz('action-orange')" id="q-orange" style="flex:1; padding: 12px; background: #f39c12; color: white; border-radius: 5px; border: none;">...</button>
                <button onclick="checkQuiz('action-purple')" id="q-purple" style="flex:1; padding: 12px; background: #9b59b6; color: white; border-radius: 5px; border: none;">...</button>
            </div>
            
            <button onclick="toggleQuiz()" style="margin-top: 20px; background: none; color: #bdc3c7; border: 1px solid #7f8c8d; padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer;">Abandonner le test</button>
        </div>
        
        <button id="btnStartQuiz" onclick="toggleQuiz()" style="margin-top: 20px; width: 100%; padding: 12px; background: #f1c40f; color: #000; font-weight: bold; border-radius: 6px; border: none; cursor: pointer;">🎓 TESTER MES CONNAISSANCES</button>
    </div>

    <script>
        const S_URL = 'https://mvncrfuuleirfainulqw.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12bmNyZnV1bGVpcmZhaW51bHF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNjY1MzQsImV4cCI6MjA4OTg0MjUzNH0.VnE7ttFDJmx5eb6oT3UBw-BvxRM_yuGT99vUocmehR0';
        const sbClient = supabase.createClient(S_URL, S_KEY);

        const ranks = ['A', 'K', 'Q', 'J', 'T', '9', '8', '7', '6', '5', '4', '3', '2'];
        let currentTab = 'RFI';
        let currentAction = 'fold';

        const labels = {
            'RFI': { blue: 'O-FOLD', green: 'O-CALL', orange: '4-BET', purple: 'ALL-IN' },
            'DEFENSE': { blue: 'FOLD', green: 'CALL', orange: '3-BET', purple: 'ALL-IN' }
        };
        
        function switchTab(tab) {
            currentTab = tab;
            
            // 1. Gérer l'apparence des onglets
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            
            // 2. AFFICHER / MASQUER le sélecteur d'adversaire (La partie qui te manque sûrement)
            const vsContainer = document.getElementById('vsPosContainer');
            if (vsContainer) {
                vsContainer.style.display = (tab === 'DEFENSE') ? 'flex' : 'none';
            }
        
            // 3. Mettre à jour les labels des boutons (Palette & Quiz)
            const btns = ['blue', 'green', 'orange', 'purple'];
            btns.forEach(color => {
                const label = labels[tab][color];
                if (document.getElementById(`btn-${color}`)) {
                    document.getElementById(`btn-${color}`).innerText = label;
                }
                if (document.getElementById(`q-${color}`)) {
                    document.getElementById(`q-${color}`).innerText = label;
                }
            });
        
            // 4. Recharger les données
            refreshData();
        }
        
        async function refreshData() {
            const pos = document.getElementById('posSelect').value;
            const stack = document.getElementById('stackSelect').value;
            const vsPos = (currentTab === 'DEFENSE') ? document.getElementById('vsPosSelect').value : 'ANY';
            
            document.querySelectorAll('.cell').forEach(c => c.className = 'cell fold');
            document.getElementById('status').innerText = "Sync " + stack + "BB...";
        
            const { data } = await sbClient.from('ranges')
                .select('*')
                .eq('position', pos)
                .eq('situation', currentTab)
                .eq('vs_position', vsPos)
                .eq('stack_depth', parseInt(stack)); // Filtrage par stack
        
            if (data) {
                data.forEach(row => {
                    const cell = document.querySelector(`[data-hand="${row.hand}"]`);
                    if (cell) cell.className = 'cell ' + row.action;
                });
                //mise à jour des stats
                updateStats(); 
                
                document.getElementById('status').innerText = `${pos} - ${stack}BB Sync`;
            } else {
                // Si aucune donnée n'est trouvée, on met quand même à jour (0.0%)
                updateStats();
            }
        }
        
        async function updateHand(hand, action) {
            const { data: { user } } = await sbClient.auth.getUser();
            if (!user) return;
        
            const pos = document.getElementById('posSelect').value;
            const stack = document.getElementById('stackSelect').value;
            const vsPos = (currentTab === 'DEFENSE') ? document.getElementById('vsPosSelect').value : 'ANY';
        
            await sbClient.from('ranges').upsert({ 
                user_id: user.id, 
                hand: hand, 
                action: action, 
                position: pos, 
                situation: currentTab,
                vs_position: vsPos,
                stack_depth: parseInt(stack) // Sauvegarde du stack
            }, { onConflict: 'user_id,hand,position,situation,vs_position,stack_depth' });
        }

        // Init Grille
        const grid = document.getElementById('pokerGrid');
        for (let i = 0; i < 13; i++) {
            for (let j = 0; j < 13; j++) {
                let hand = (i < j) ? ranks[i]+ranks[j]+"s" : (i > j) ? ranks[j]+ranks[i]+"o" : ranks[i]+ranks[j];
                const cell = document.createElement('div');
                cell.className = 'cell fold';
                cell.textContent = hand;
                cell.dataset.hand = hand;
                cell.onclick = () => {
                    cell.className = 'cell ' + currentAction;
                    updateHand(hand, currentAction);
                    //maj des stats
                    updateStats();
                };
                grid.appendChild(cell);
            }
        }

        // Palette
        document.querySelectorAll('.tool').forEach(tool => {
            tool.addEventListener('click', () => {
                document.querySelectorAll('.tool').forEach(t => t.classList.remove('active'));
                tool.classList.add('active');
                currentAction = tool.dataset.action;
            });
        });

        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await sbClient.auth.signInWithPassword({ email, password });
            if (error) alert("Erreur: " + error.message);
        }

        sbClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('login-overlay').style.display = 'none';
                refreshData();
            }
        });
        //fonction copier
        let copiedRangeData = null;
        let copiedSourceInfo = ""; // Pour afficher ce qu'on a en mémoire
        
        function copyCurrentRange() {
            const cells = document.querySelectorAll('.cell');
            let dataToCopy = [];
            
            cells.forEach(cell => {
                const action = Array.from(cell.classList).find(cls => cls.startsWith('action-') || cls === 'fold');
                if (action && action !== 'fold') {
                    dataToCopy.push({ hand: cell.dataset.hand, action: action });
                }
            });
        
            if (dataToCopy.length === 0) {
                alert("La range actuelle est vide.");
                return;
            }
        
            const pos = document.getElementById('posSelect').value;
            const stack = document.getElementById('stackSelect').value;
            const vsPos = (currentTab === 'DEFENSE') ? document.getElementById('vsPosSelect').value : 'ANY';
        
            copiedRangeData = dataToCopy;
            copiedSourceInfo = `${pos} ${stack}BB ${currentTab === 'DEFENSE' ? 'vs ' + vsPos : '(RFI)'}`;
            
            document.getElementById('pasteBtn').style.display = 'block';
            document.getElementById('status').innerText = "Copié : " + copiedSourceInfo;
        }
        //fonction coller
        async function pasteRange() {
            if (!copiedRangeData) return;
        
            const targetPos = document.getElementById('posSelect').value;
            const targetStack = document.getElementById('stackSelect').value;
            const targetVsPos = (currentTab === 'DEFENSE') ? document.getElementById('vsPosSelect').value : 'ANY';
            const { data: { user } } = await sbClient.auth.getUser();
        
            const confirmMsg = `Coller la range de [${copiedSourceInfo}] \nVERS \n[${targetPos} ${targetStack}BB ${currentTab === 'DEFENSE' ? 'vs ' + targetVsPos : '(RFI)'}] ?`;
            
            if (!confirm(confirmMsg)) return;
        
            document.getElementById('status').innerText = "Collage en cours...";
        
            const upsertData = copiedRangeData.map(item => ({
                user_id: user.id,
                hand: item.hand,
                action: item.action,
                position: targetPos,
                situation: currentTab,
                vs_position: targetVsPos,
                stack_depth: parseInt(targetStack)
            }));
        
            const { error } = await sbClient.from('ranges').upsert(upsertData, { 
                onConflict: 'user_id,hand,position,situation,vs_position,stack_depth' 
            });
        
            if (error) {
                alert("Erreur : " + error.message);
            } else {
                document.getElementById('status').innerText = "Collage réussi !";
                refreshData();
            }
        }
        //fonction maj stats
        function updateStats() {
            const cells = document.querySelectorAll('.cell');
            let totalCombos = 0, playedCombos = 0, aggroCombos = 0;
        
            cells.forEach(cell => {
                const hand = cell.dataset.hand;
                let weight = hand.includes('s') ? 4 : (hand.includes('o') ? 12 : 6);
                totalCombos += weight;
        
                const hasClass = (c) => cell.classList.contains(c);
        
                // VPIP : Toutes les couleurs sauf fold
                if (hasClass('action-blue') || hasClass('action-green') || 
                    hasClass('action-orange') || hasClass('action-purple')) {
                    playedCombos += weight;
                }
                
                // PFR : Orange (3/4-bet) et Purple (All-in)
                if (hasClass('action-orange') || hasClass('action-purple')) {
                    aggroCombos += weight;
                }
            });
        
            document.getElementById('statVPIP').innerText = ((playedCombos / totalCombos) * 100).toFixed(1) + "%";
            document.getElementById('statPFR').innerText = ((aggroCombos / totalCombos) * 100).toFixed(1) + "%";
        }
        //fonction reset
        async function resetCurrentRange() {
            const pos = document.getElementById('posSelect').value;
            const stack = document.getElementById('stackSelect').value;
            const vsPos = (currentTab === 'DEFENSE') ? document.getElementById('vsPosSelect').value : 'ANY';
        
            if (!confirm(`Voulez-vous vraiment effacer TOUTE la range ${pos} ${stack}BB ?`)) return;
        
            const { data: { user } } = await sbClient.auth.getUser();
            
            // Suppression en base de données
            const { error } = await sbClient.from('ranges')
                .delete()
                .eq('user_id', user.id)
                .eq('position', pos)
                .eq('situation', currentTab)
                .eq('vs_position', vsPos)
                .eq('stack_depth', parseInt(stack));
        
            if (error) {
                alert("Erreur lors du reset : " + error.message);
            } else {
                document.querySelectorAll('.cell').forEach(c => c.className = 'cell fold');
                updateStats();
                document.getElementById('status').innerText = "Range effacée.";
            }
        }
        //Quiz
        let quizActive = false;
        let currentQuizHand = "";
        let quizCorrectAction = "";
        let questionsDone = 0;
        let score = 0;
        
        function toggleQuiz() {
            quizActive = !quizActive;
            const quizDiv = document.getElementById('quizSection');
            const gridDiv = document.getElementById('pokerGrid');
            const btnStart = document.getElementById('btnStartQuiz');
            
            if (quizActive) {
                // Reset des stats du quiz
                questionsDone = 0;
                score = 0;
                updateQuizUI();
                
                document.getElementById('q-blue').innerText = labels[currentTab].blue;
                document.getElementById('q-green').innerText = labels[currentTab].green;
                document.getElementById('q-red').innerText = labels[currentTab].red;
                
                quizDiv.style.display = 'block';
                gridDiv.style.display = 'none'; // On cache complètement la grille
                btnStart.style.display = 'none';
                nextQuizHand();
            } else {
                quizDiv.style.display = 'none';
                gridDiv.style.display = 'grid';
                btnStart.style.display = 'block';
            }
        }
        
        function updateQuizUI() {
            document.getElementById('quizCount').innerText = questionsDone + 1;
            document.getElementById('quizScore').innerText = score;
            const progress = (questionsDone / 20) * 100;
            document.getElementById('quizProgress').style.width = progress + "%";
        }
        
        function nextQuizHand() {
            if (questionsDone >= 20) {
                finishQuiz();
                return;
            }
            
            const allHands = [];
            document.querySelectorAll('.cell').forEach(c => allHands.push(c.dataset.hand));
            
            currentQuizHand = allHands[Math.floor(Math.random() * allHands.length)];
            document.getElementById('quizHand').innerText = currentQuizHand;
            
            const cell = document.querySelector(`[data-hand="${currentQuizHand}"]`);
            quizCorrectAction = Array.from(cell.classList).find(cls => cls.startsWith('action-') || cls === 'fold') || 'fold';
            
            updateQuizUI();
        }
        
        function checkQuiz(userAction) {
            const quizBox = document.getElementById('quizSection');
            
            if (userAction === quizCorrectAction) {
                score++;
                quizBox.style.background = "#1e8449"; // Succès éphémère
            } else {
                quizBox.style.background = "#922b21"; // Erreur éphémère
                alert(`Faux ! Pour ${currentQuizHand}, l'action était : ${quizCorrectAction.replace('action-', '').toUpperCase()}`);
            }
        
            questionsDone++;
            
            setTimeout(() => {
                quizBox.style.background = "#2c3e50";
                nextQuizHand();
            }, 200);
        }
        
        function finishQuiz() {
            let appreciation = "";
            if (score === 20) appreciation = "Parfait ! Tu maîtrises cette range.";
            else if (score >= 15) appreciation = "Très bien, encore un petit effort.";
            else if (score >= 10) appreciation = "Moyen, relis tes ranges.";
            else appreciation = "Aïe... il faut retourner bosser la théorie !";
        
            alert(`Terminé ! \nScore : ${score} / 20 \n\n${appreciation}`);
            toggleQuiz();
        }
    </script>
</body>
</html>
