<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Playbook Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #121212; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .container { background: #1e1e1e; padding: 15px; border-radius: 12px; width: 100%; max-width: 500px; box-sizing: border-box; }
        
        /* Onglets */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; background: #2a2a2a; padding: 5px; border-radius: 8px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 13px; color: #888; }
        .tab.active { background: #3498db; color: white; }

        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        select { width: 100%; padding: 10px; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 6px; font-size: 13px; }

        .grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 2px; }
        .cell { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; cursor: pointer; border-radius: 2px; border: 1px solid rgba(255,255,255,0.03); }
        
        /* Couleurs Dynamiques */
        .fold { background: #2a2a2a; color: #555; }
        .action-blue { background: #3498db; color: white; } /* Open-Fold OU Fold */
        .action-green { background: #2ecc71; color: white; } /* Open-Call OU Call */
        .action-red { background: #e74c3c; color: white; } /* 4Bet OU 3Bet */

        .palette { display: flex; gap: 5px; margin: 15px 0; }
        .tool { flex: 1; padding: 12px 5px; border-radius: 5px; cursor: pointer; border: 2px solid transparent; font-weight: bold; font-size: 10px; text-align: center; }
        .tool.active { border-color: white; }
        
        #login-overlay { position: fixed; inset: 0; background: #121212; display: flex; align-items: center; justify-content: center; z-index: 100; flex-direction: column; gap: 15px; }
        input { padding: 12px; border-radius: 6px; border: 1px solid #333; width: 250px; background: #1e1e1e; color: white; }
        .status { font-size: 11px; color: #666; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h2>Poker Vault</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Mot de passe">
        <button onclick="signIn()" style="padding: 12px 250px; background: #3498db; border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: bold;">Connexion</button>
    </div>

    <div class="container">
        <div class="tabs">
            <div class="tab active" id="tab-RFI" onclick="switchTab('RFI')">MON OPEN (RFI)</div>
            <div class="tab" id="tab-DEFENSE" onclick="switchTab('DEFENSE')">DÉFENSE (Vs RFI)</div>
        </div>

        <div class="controls">
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <label style="font-size: 11px; color: #f39c12; font-weight: bold;">TAILLE DU STACK</label>
                <select id="stackSelect" onchange="refreshData()" style="border-color: #f39c12;">
                    <option value="100">100 BB</option>
                    <option value="80">80 BB</option>
                    <option value="60">60 BB</option>
                    <option value="40">40 BB</option>
                    <option value="30">30 BB</option>
                    <option value="20">20 BB</option>
                    <option value="14">14 BB</option>
                    <option value="10">10 BB</option>
                </select>
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <label style="font-size: 11px; color: #888;">MA POSITION</label>
                <select id="posSelect" onchange="refreshData()">
                    <option value="HJ">HJ</option>
                    <option value="CO">CO</option>
                    <option value="BTN">BTN</option>
                    <option value="SB">SB</option>
                    <option value="BB">BB</option>
                </select>
            </div>
        
            <div id="vsPosContainer" style="display: none; flex-direction: column; gap: 5px;">
                <label style="font-size: 11px; color: #e74c3c; font-weight: bold;">VS OPEN DE :</label>
                <select id="vsPosSelect" onchange="refreshData()">
                    <option value="UTG">UTG</option>
                    <option value="HJ">HJ</option>
                    <option value="CO">CO</option>
                    <option value="BTN">BTN</option>
                    <option value="SB">SB</option>
                </select>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button onclick="copyCurrentRange()" style="flex: 1; padding: 8px; background: #444; color: #fff; border: 1px solid #666; border-radius: 4px; font-size: 11px; cursor: pointer;">
                    📋 Copier cette range
                </button>
                <button id="pasteBtn" onclick="pasteRange()" style="flex: 1; padding: 8px; background: #27ae60; color: #fff; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; display: none;">
                    📥 Coller ici
                </button>
            </div>
        </div>

        <div class="palette" id="palette">
            <div class="tool fold active" data-action="fold">FOLD</div>
            <div class="tool action-blue" id="btn-blue" data-action="action-blue">O-FOLD</div>
            <div class="tool action-green" id="btn-green" data-action="action-green">O-CALL</div>
            <div class="tool action-red" id="btn-red" data-action="action-red">4BET/AI</div>
        </div>

        <div id="statsPanel" style="display: flex; gap: 10px; margin-bottom: 10px; width: 100%;">
            <div style="flex: 1; background: #2a2a2a; padding: 10px; border-radius: 8px; text-align: center; border-bottom: 3px solid #3498db;">
                <span style="display: block; font-size: 10px; color: #888; text-transform: uppercase;">Fréquence Jouée</span>
                <span id="statVPIP" style="font-size: 18px; font-weight: bold; color: white;">0.0%</span>
            </div>
            <div style="flex: 1; background: #2a2a2a; padding: 10px; border-radius: 8px; text-align: center; border-bottom: 3px solid #e74c3c;">
                <span style="display: block; font-size: 10px; color: #888; text-transform: uppercase;">Fréquence Aggro</span>
                <span id="statPFR" style="font-size: 18px; font-weight: bold; color: white;">0.0%</span>
            </div>
        </div>

        <div id="pokerGrid" class="grid"></div>
        <div id="status" class="status">Connecté</div>
    </div>

    <script>
        const S_URL = 'https://mvncrfuuleirfainulqw.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12bmNyZnV1bGVpcmZhaW51bHF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNjY1MzQsImV4cCI6MjA4OTg0MjUzNH0.VnE7ttFDJmx5eb6oT3UBw-BvxRM_yuGT99vUocmehR0';
        const sbClient = supabase.createClient(S_URL, S_KEY);

        const ranks = ['A', 'K', 'Q', 'J', 'T', '9', '8', '7', '6', '5', '4', '3', '2'];
        let currentTab = 'RFI';
        let currentAction = 'fold';

        const labels = {
            'RFI': { blue: 'O-FOLD', green: 'O-CALL', red: '4BET/AI' },
            'DEFENSE': { blue: 'FOLD', green: 'CALL', red: '3BET/AI' }
        };

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            
            // Afficher/Masquer le sélecteur d'adversaire
            const vsContainer = document.getElementById('vsPosContainer');
            vsContainer.style.display = (tab === 'DEFENSE') ? 'flex' : 'none';
        
            // Update labels
            document.getElementById('btn-blue').innerText = labels[tab].blue;
            document.getElementById('btn-green').innerText = labels[tab].green;
            document.getElementById('btn-red').innerText = labels[tab].red;
        
            refreshData();
        }
        
        async function refreshData() {
            const pos = document.getElementById('posSelect').value;
            const stack = document.getElementById('stackSelect').value;
            const vsPos = (currentTab === 'DEFENSE') ? document.getElementById('vsPosSelect').value : 'ANY';
            
            document.querySelectorAll('.cell').forEach(c => c.className = 'cell fold');
            document.getElementById('status').innerText = "Sync " + stack + "BB...";
        
            const { data } = await sbClient.from('ranges')
                .select('*')
                .eq('position', pos)
                .eq('situation', currentTab)
                .eq('vs_position', vsPos)
                .eq('stack_depth', parseInt(stack)); // Filtrage par stack
        
            if (data) {
                data.forEach(row => {
                    const cell = document.querySelector(`[data-hand="${row.hand}"]`);
                    if (cell) cell.className = 'cell ' + row.action;
                });
                //mise à jour des stats
                updateStats(); 
                
                document.getElementById('status').innerText = `${pos} - ${stack}BB Sync`;
            } else {
                // Si aucune donnée n'est trouvée, on met quand même à jour (0.0%)
                updateStats();
            }
        }
        
        async function updateHand(hand, action) {
            const { data: { user } } = await sbClient.auth.getUser();
            if (!user) return;
        
            const pos = document.getElementById('posSelect').value;
            const stack = document.getElementById('stackSelect').value;
            const vsPos = (currentTab === 'DEFENSE') ? document.getElementById('vsPosSelect').value : 'ANY';
        
            await sbClient.from('ranges').upsert({ 
                user_id: user.id, 
                hand: hand, 
                action: action, 
                position: pos, 
                situation: currentTab,
                vs_position: vsPos,
                stack_depth: parseInt(stack) // Sauvegarde du stack
            }, { onConflict: 'user_id,hand,position,situation,vs_position,stack_depth' });
        }

        // Init Grille
        const grid = document.getElementById('pokerGrid');
        for (let i = 0; i < 13; i++) {
            for (let j = 0; j < 13; j++) {
                let hand = (i < j) ? ranks[i]+ranks[j]+"s" : (i > j) ? ranks[j]+ranks[i]+"o" : ranks[i]+ranks[j];
                const cell = document.createElement('div');
                cell.className = 'cell fold';
                cell.textContent = hand;
                cell.dataset.hand = hand;
                cell.onclick = () => {
                    cell.className = 'cell ' + currentAction;
                    updateHand(hand, currentAction);
                    //maj des stats
                    updateStats();
                };
                grid.appendChild(cell);
            }
        }

        // Palette
        document.querySelectorAll('.tool').forEach(tool => {
            tool.addEventListener('click', () => {
                document.querySelectorAll('.tool').forEach(t => t.classList.remove('active'));
                tool.classList.add('active');
                currentAction = tool.dataset.action;
            });
        });

        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await sbClient.auth.signInWithPassword({ email, password });
            if (error) alert("Erreur: " + error.message);
        }

        sbClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('login-overlay').style.display = 'none';
                refreshData();
            }
        });

        let copiedRangeData = null;
        let copiedSourceInfo = ""; // Pour afficher ce qu'on a en mémoire
        
        function copyCurrentRange() {
            const cells = document.querySelectorAll('.cell');
            let dataToCopy = [];
            
            cells.forEach(cell => {
                const action = Array.from(cell.classList).find(cls => cls.startsWith('action-') || cls === 'fold');
                if (action && action !== 'fold') {
                    dataToCopy.push({ hand: cell.dataset.hand, action: action });
                }
            });
        
            if (dataToCopy.length === 0) {
                alert("La range actuelle est vide.");
                return;
            }
        
            const pos = document.getElementById('posSelect').value;
            const stack = document.getElementById('stackSelect').value;
            const vsPos = (currentTab === 'DEFENSE') ? document.getElementById('vsPosSelect').value : 'ANY';
        
            copiedRangeData = dataToCopy;
            copiedSourceInfo = `${pos} ${stack}BB ${currentTab === 'DEFENSE' ? 'vs ' + vsPos : '(RFI)'}`;
            
            document.getElementById('pasteBtn').style.display = 'block';
            document.getElementById('status').innerText = "Copié : " + copiedSourceInfo;
        }
        
        async function pasteRange() {
            if (!copiedRangeData) return;
        
            const targetPos = document.getElementById('posSelect').value;
            const targetStack = document.getElementById('stackSelect').value;
            const targetVsPos = (currentTab === 'DEFENSE') ? document.getElementById('vsPosSelect').value : 'ANY';
            const { data: { user } } = await sbClient.auth.getUser();
        
            const confirmMsg = `Coller la range de [${copiedSourceInfo}] \nVERS \n[${targetPos} ${targetStack}BB ${currentTab === 'DEFENSE' ? 'vs ' + targetVsPos : '(RFI)'}] ?`;
            
            if (!confirm(confirmMsg)) return;
        
            document.getElementById('status').innerText = "Collage en cours...";
        
            const upsertData = copiedRangeData.map(item => ({
                user_id: user.id,
                hand: item.hand,
                action: item.action,
                position: targetPos,
                situation: currentTab,
                vs_position: targetVsPos,
                stack_depth: parseInt(targetStack)
            }));
        
            const { error } = await sbClient.from('ranges').upsert(upsertData, { 
                onConflict: 'user_id,hand,position,situation,vs_position,stack_depth' 
            });
        
            if (error) {
                alert("Erreur : " + error.message);
            } else {
                document.getElementById('status').innerText = "Collage réussi !";
                refreshData();
            }
        }

        function updateStats() {
            const cells = document.querySelectorAll('.cell');
            let totalCombos = 0;
            let playedCombos = 0;
            let aggroCombos = 0;
        
            cells.forEach(cell => {
                const hand = cell.dataset.hand;
                // Calcul du nombre de combinaisons (Paire: 6, Suité: 4, Offsuit: 12)
                let weight = hand.includes('s') ? 4 : (hand.includes('o') ? 12 : 6);
                totalCombos += weight;
        
                if (cell.classList.contains('action-blue') || cell.classList.contains('action-green') || cell.classList.contains('action-red')) {
                    playedCombos += weight;
                }
                if (cell.classList.contains('action-red')) {
                    aggroCombos += weight;
                }
            });
        
            const vpip = ((playedCombos / totalCombos) * 100).toFixed(1);
            const pfr = ((aggroCombos / totalCombos) * 100).toFixed(1);
        
            document.getElementById('statVPIP').innerText = vpip + "%";
            document.getElementById('statPFR').innerText = pfr + "%";
        }
    </script>
</body>
</html>
