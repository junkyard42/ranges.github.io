<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Playbook Pro - Ultimate Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #121212; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .container { background: #1e1e1e; padding: 15px; border-radius: 12px; width: 100%; max-width: 500px; box-sizing: border-box; }
        
        /* Onglets et Contrôles */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; background: #2a2a2a; padding: 5px; border-radius: 8px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 13px; color: #888; }
        .tab.active { background: #3498db; color: white; }
        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        select { width: 100%; padding: 10px; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 6px; font-size: 13px; }

        /* Grille de Poker */
        .grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 2px; }
        .cell { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; cursor: pointer; border-radius: 2px; border: 1px solid rgba(255,255,255,0.03); }
        
        /* --- COULEURS --- */
        .fold { background: #2a2a2a; color: #555; }
        .action-blue { background: #3498db; color: white; }
        .action-green { background: #2ecc71; color: white; }
        .action-orange { background: #f39c12; color: white; }
        .action-purple { background: #9b59b6; color: white; }
        /* Série L (Pastels) */
        .action-l-fold { background: #5d6d7e; color: #ebf5fb; }
        .action-l-call { background: #48c9b0; color: #145a32; }
        .action-l-3bet { background: #edbb99; color: #6e2c00; }
        .action-l-ai { background: #f1948a; color: #641e16; }
        /* Série O (Vifs) */
        .action-o-fold { background: #2e86de; color: white; }
        .action-o-call { background: #28b463; color: white; }
        .action-o-4bet { background: #d35400; color: white; }
        .action-o-ai { background: #884ea0; color: white; }

        /* Palette adaptative */
        .palette { margin: 15px 0; gap: 5px; }
        .palette.std-mode { display: flex; flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; }
        .palette.sb-mode { display: grid; grid-template-columns: repeat(3, 1fr); }
        .tool { padding: 10px 5px; border-radius: 5px; cursor: pointer; border: 2px solid transparent; font-weight: bold; font-size: 9px; text-align: center; }
        .tool.active { border-color: white; }
        
        /* Import / Export & Quiz */
        .io-section { margin-top: 15px; padding: 10px; background: #252525; border-radius: 8px; border: 1px solid #333; }
        .io-area { width: 100%; height: 50px; background: #121212; color: #2ecc71; border: 1px solid #444; border-radius: 4px; font-family: monospace; font-size: 11px; padding: 5px; box-sizing: border-box; resize: none; margin-bottom: 8px; }
        .quick-presets { display: flex; gap: 6px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .quick-presets::-webkit-scrollbar { display: none; }
        .quick-presets button { flex: 0 0 auto; border: none; border-radius: 6px; font-size: 10px; cursor: pointer; padding: 8px 12px; white-space: nowrap; font-weight: bold; }

        #login-overlay { position: fixed; inset: 0; background: #121212; display: flex; align-items: center; justify-content: center; z-index: 100; flex-direction: column; gap: 15px; }
        input { padding: 12px; border-radius: 6px; border: 1px solid #333; width: 250px; background: #1e1e1e; color: white; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h2>Poker Playbook Pro</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Mot de passe">
        <button onclick="signIn()" style="padding: 12px 100px; background: #3498db; border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: bold;">Connexion</button>
    </div>

    <div class="container">
        <div class="tabs">
            <div class="tab active" id="tab-RFI" onclick="switchTab('RFI')">MON OPEN (RFI)</div>
            <div class="tab" id="tab-DEFENSE" onclick="switchTab('DEFENSE')">DÉFENSE (Vs RFI)</div>
        </div>

        <div class="controls">
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <label style="font-size: 11px; color: #f39c12; font-weight: bold;">TAILLE DU STACK</label>
                <select id="stackSelect" onchange="refreshData()">
                    <option value="100">100 BB</option><option value="80">80 BB</option>
                    <option value="60">60 BB</option><option value="40">40 BB</option>
                    <option value="30">30 BB</option><option value="20">20 BB</option>
                    <option value="14">14 BB</option><option value="10">10 BB</option>
                </select>
            </div>

            <div class="quick-presets">
                <button onclick="applyPreset('RFI', 'BTN', 'ANY')" style="background: #2e86de; color: white;">🔥 RFI BTN</button>
                <button onclick="applyPreset('RFI', 'SB', 'ANY')" style="background: #d35400; color: white;">🔥 RFI SB</button>
                <button onclick="applyPreset('DEFENSE', 'SB', 'BTN')" style="background: #34495e; color: #ecf0f1; border: 1px solid #7f8c8d;">🎯 SB vs BTN</button>
                <button onclick="applyPreset('DEFENSE', 'BB', 'BTN')" style="background: #28b463; color: white;">🎯 BB vs BTN</button>
            </div>
            
            <select id="posSelect" onchange="updateVsPosOptions(); refreshData();">
                <option value="UTG">UTG</option><option value="UTG+1">UTG+1</option>
                <option value="MP">MP</option><option value="HJ">HJ</option>
                <option value="CO">CO</option><option value="BTN">BTN</option>
                <option value="SB">SB</option><option value="BB">BB</option>
            </select>

            <div id="vsPosContainer" style="display: none;"><select id="vsPosSelect" onchange="refreshData();"></select></div>

            <div style="display: flex; gap: 10px; margin-top: 5px;">
                <button onclick="copyCurrentRange()" style="flex: 1; padding: 8px; background: #444; color: #fff; border: 1px solid #666; border-radius: 4px; font-size: 11px; cursor: pointer;">📋 Copier</button>
                <button id="pasteBtn" onclick="pasteRange()" style="flex: 1; padding: 8px; background: #27ae60; color: #fff; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; display: none;">📥 Coller</button>
            </div>
        </div>

        <div id="palette" class="palette"></div>

        <div id="statsPanel" style="display: flex; gap: 10px; margin-bottom: 10px;">
            <div style="flex: 1; background: #2a2a2a; padding: 10px; border-radius: 8px; text-align: center; border-bottom: 3px solid #3498db;">
                <span style="font-size: 10px; color: #888;">VPIP</span>
                <span id="statVPIP" style="display: block; font-size: 18px; font-weight: bold;">0.0%</span>
            </div>
            <div style="flex: 1; background: #2a2a2a; padding: 10px; border-radius: 8px; text-align: center; border-bottom: 3px solid #e74c3c;">
                <span style="font-size: 10px; color: #888;">PFR</span>
                <span id="statPFR" style="display: block; font-size: 18px; font-weight: bold;">0.0%</span>
            </div>
            <div id="btnFinalize" onclick="toggleFinalize()" style="cursor: pointer; background: #2a2a2a; padding: 10px; border-radius: 8px; text-align: center; border-bottom: 3px solid #555; transition: 0.3s;">
                <span id="finalizeIcon" style="font-size: 18px;">⚪</span>
                <span id="finalizeText" style="display: block; font-size: 10px; color: #888;">BROUILLON</span>
            </div>
        </div>

        <div id="pokerGrid" class="grid"></div>

        <div class="io-section">
            <textarea id="ioText" class="io-area" placeholder="Import/Export Format : AA, 22+, AJs+"></textarea>
            <div style="display: flex; gap: 5px;">
                <button onclick="exportRange()" style="flex: 1; background: #444; color: white; padding: 8px; font-size: 10px; border-radius: 4px; border:none; cursor:pointer;">📤 EXPORTER</button>
                <button onclick="importRange()" style="flex: 1; background: #27ae60; color: white; padding: 8px; font-size: 10px; border-radius: 4px; border:none; cursor:pointer;">📥 IMPORTER</button>
            </div>
        </div>

        <button id="btnStartQuiz" onclick="toggleQuiz()" style="margin-top: 15px; width: 100%; padding: 12px; background: #f1c40f; color: #000; font-weight: bold; border-radius: 6px; border: none; cursor: pointer;">🎓 TESTER MES CONNAISSANCES</button>

        <div id="quizSection" style="display:none; background: #2c3e50; padding: 15px; border-radius: 10px; text-align: center; margin-top: 20px;">
            <div style="display: flex; justify-content: space-between; font-size: 12px; color: #bdc3c7;">
                <span>Q: <b id="quizCount">1</b>/20</span><span>Score: <b id="quizScore">0</b>/20</span>
            </div>
            <h3 style="margin: 10px 0;">Action pour : <span id="quizHand" style="color: #f1c40f; font-size: 28px;">??</span></h3>
            <div id="quizOptions" class="palette"></div>
            <button onclick="toggleQuiz()" style="margin-top: 10px; background: none; color: #bdc3c7; border: 1px solid #7f8c8d; cursor: pointer; border-radius: 4px; font-size: 10px;">Arrêter</button>
        </div>

        <button onclick="resetCurrentRange()" style="margin-top: 20px; width: 100%; background: none; color: #666; border: none; font-size: 11px; cursor: pointer; text-decoration: underline;">🗑️ Effacer cette range</button>
        <div id="status" style="font-size: 10px; color: #444; text-align: center; margin-top: 10px;">Sync...</div>
    </div>

    <script>
        const sbClient = supabase.createClient(S_URL, S_KEY);
        const ranks = ['A', 'K', 'Q', 'J', 'T', '9', '8', '7', '6', '5', '4', '3', '2'];
        let currentTab = 'RFI', currentAction = 'fold', quizActive = false, score = 0, questionsDone = 0, quizCorrectAction = "", copiedData = null;

        const actionsSB = [
            { id: 'fold', label: 'FOLD', class: 'fold' },
            { id: 'action-l-fold', label: 'L-FOLD', class: 'action-l-fold' }, { id: 'action-l-call', label: 'L-CALL', class: 'action-l-call' },
            { id: 'action-l-3bet', label: 'L-3BET', class: 'action-l-3bet' }, { id: 'action-l-ai', label: 'L-AI', class: 'action-l-ai' },
            { id: 'action-o-fold', label: 'O-FOLD', class: 'action-o-fold' }, { id: 'action-o-call', label: 'O-CALL', class: 'action-o-call' }, 
            { id: 'action-o-4bet', label: 'O-4BET', class: 'action-o-4bet' }, { id: 'action-o-ai', label: 'O-AI', class: 'action-o-ai' }
        ];

        const actionsStd = [
            { id: 'fold', label: 'FOLD', class: 'fold' },
            { id: 'action-blue', label: 'RAISE/FOLD', class: 'action-blue' }, { id: 'action-green', label: 'RAISE/CALL', class: 'action-green' },
            { id: 'action-orange', label: '3/4-BET', class: 'action-orange' }, { id: 'action-purple', label: 'ALL-IN', class: 'action-purple' }
        ];

        const grid = document.getElementById('pokerGrid');
        for (let i = 0; i < 13; i++) {
            for (let j = 0; j < 13; j++) {
                let hand = (i < j) ? ranks[i]+ranks[j]+"s" : (i > j) ? ranks[j]+ranks[i]+"o" : ranks[i]+ranks[j];
                const cell = document.createElement('div');
                cell.className = 'cell fold'; cell.textContent = hand; cell.dataset.hand = hand;
                cell.onclick = () => { if(quizActive) return; cell.className = 'cell ' + currentAction; updateHand(hand, currentAction); updateStats(); };
                grid.appendChild(cell);
            }
        }

        function buildPalette(targetId, isQuiz = false) {
            const pos = document.getElementById('posSelect').value;
            const container = document.getElementById(targetId);
            container.innerHTML = '';
            const isSBMode = (pos === 'SB' && currentTab === 'RFI');
            const list = isSBMode ? actionsSB : actionsStd;
            container.className = isSBMode ? 'palette sb-mode' : 'palette std-mode';

            list.forEach(a => {
                const btn = document.createElement('div');
                btn.className = `tool ${a.class} ${!isQuiz && currentAction === a.id ? 'active' : ''}`;
                btn.innerText = a.label;
                btn.onclick = () => isQuiz ? checkQuiz(a.id) : setAction(a.id, btn);
                container.appendChild(btn);
            });
        }

        function setAction(id, btn) {
            currentAction = id;
            document.querySelectorAll('#palette .tool').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
        }

        async function refreshData() {
            // 1. On sécurise l'interface
            const statusEl = document.getElementById('status');
            if (statusEl) statusEl.innerText = "Sync...";
            
            // 2. On vérifie la palette
            buildPalette('palette');
        
            // 3. Récupération des filtres
            const pos = document.getElementById('posSelect').value;
            const stack = document.getElementById('stackSelect').value;
            const vsPosSelect = document.getElementById('vsPosSelect');
            const vsPos = (currentTab === 'DEFENSE' && vsPosSelect) ? vsPosSelect.value : 'ANY';
        
            // 4. Reset visuel de la grille
            document.querySelectorAll('.cell').forEach(c => c.className = 'cell fold');
        
            try {
                const { data: { user } } = await sbClient.auth.getUser();
                if (!user) {
                    if (statusEl) statusEl.innerText = "Non connecté";
                    return;
                }
        
                const { data, error } = await sbClient
                    .from('ranges')
                    .select('*')
                    .eq('user_id', user.id) // Ajout de sécurité pour ne voir que TES ranges
                    .eq('position', pos)
                    .eq('situation', currentTab)
                    .eq('vs_position', vsPos)
                    .eq('stack_depth', parseInt(stack));
        
                if (error) throw error;
        
                if (data) {
                    data.forEach(row => {
                        const cell = document.querySelector(`[data-hand="${row.hand}"]`);
                        if (cell) cell.className = 'cell ' + row.action;
                    });
                }
                
                updateStats();
                if (statusEl) statusEl.innerText = "Connecté - " + pos;
        
            } catch (err) {
                console.error("Erreur de synchro:", err);
                if (statusEl) statusEl.innerText = "Erreur de connexion";
            }
        }
        
        // Correction du listener de connexion pour éviter la boucle infinie
        sbClient.auth.onAuthStateChange((event, session) => {
            const loginOverlay = document.getElementById('login-overlay');
            if (session) {
                if (loginOverlay) loginOverlay.style.display = 'none';
                updateVsPosOptions();
                // Petit délai pour laisser le DOM se mettre à jour
                setTimeout(refreshData, 100);
            } else {
                if (loginOverlay) loginOverlay.style.display = 'flex';
            }
        });

        function updateStats() {
            let total = 0, played = 0, aggro = 0;
            document.querySelectorAll('.cell').forEach(c => {
                let w = c.dataset.hand.includes('s') ? 4 : (c.dataset.hand.includes('o') ? 12 : 6);
                total += w;
                if (!c.classList.contains('fold')) played += w;
                if (c.className.includes('-o-') || c.classList.contains('action-orange') || c.classList.contains('action-purple')) aggro += w;
            });
            document.getElementById('statVPIP').innerText = (played/total*100).toFixed(1) + "%";
            document.getElementById('statPFR').innerText = (aggro/total*100).toFixed(1) + "%";
        }

        // --- QUIZ ---
        function toggleQuiz() {
            quizActive = !quizActive;
            document.getElementById('quizSection').style.display = quizActive ? 'block' : 'none';
            document.getElementById('pokerGrid').style.display = quizActive ? 'none' : 'grid';
            if (quizActive) { score = 0; questionsDone = 0; nextQuizHand(); }
        }
        function nextQuizHand() {
            if (questionsDone >= 20) { alert(`Score : ${score} / 20`); toggleQuiz(); return; }
            buildPalette('quizOptions', true);
            const cells = Array.from(document.querySelectorAll('.cell'));
            const randomHand = cells[Math.floor(Math.random() * cells.length)].dataset.hand;
            document.getElementById('quizHand').innerText = randomHand;
            const cell = document.querySelector(`[data-hand="${randomHand}"]`);
            quizCorrectAction = Array.from(cell.classList).find(cls => cls.startsWith('action-') || cls === 'fold') || 'fold';
            document.getElementById('quizCount').innerText = questionsDone + 1;
            document.getElementById('quizScore').innerText = score;
        }
        function checkQuiz(userAction) {
            if (userAction === quizCorrectAction) score++;
            else alert(`Faux ! C'était : ${quizCorrectAction.toUpperCase()}`);
            questionsDone++; nextQuizHand();
        }

        // --- EXPORT/IMPORT ---
        function exportRange() {
            const activeHands = Array.from(document.querySelectorAll('.cell')).filter(c => c.classList.contains(currentAction)).map(c => c.dataset.hand);
            document.getElementById('ioText').value = activeHands.join(', ');
        }
        async function importRange() {
            const textarea = document.getElementById('ioText');
            const text = textarea.value;
            if(!text || currentAction === 'fold') {
                alert("Collez du texte et sélectionnez une action (ex: O-CALL)");
                return;
            }
        
            const { data: { user } } = await sbClient.auth.getUser();
            const vsPos = (currentTab === 'DEFENSE') ? document.getElementById('vsPosSelect').value : 'ANY';
            const pos = document.getElementById('posSelect').value;
            const stack = parseInt(document.getElementById('stackSelect').value);
            
            // Nettoyage radical : on remplace les virgules par des espaces, puis on découpe
            const tokens = text.replace(/,/g, ' ').split(/\s+/).filter(t => t.length > 0);
            let handsToUpdate = new Set();
        
            tokens.forEach(token => {
                // On nettoie chaque token individuellement (Espaces et Casse)
                let cleanToken = token.trim();
                // Normalisation : "AKO" -> "AKo", "AKS" -> "AKs", "TT" -> "TT"
                if (cleanToken.length === 3) {
                    cleanToken = cleanToken.substring(0, 2).toUpperCase() + cleanToken.substring(2).toLowerCase();
                } else {
                    cleanToken = cleanToken.toUpperCase();
                }
        
                if (cleanToken.includes('+')) {
                    const base = cleanToken.replace('+', '');
                    if (base.length === 2) { // Pairs: TT+
                        const startIndex = ranks.indexOf(base[0]);
                        // On remonte de la paire de base jusqu'à AA
                        for (let i = 0; i <= startIndex; i++) {
                            handsToUpdate.add(ranks[i] + ranks[i]);
                        }
                    } else if (base.length === 3) { // Suited/Offsuit: AJs+
                        const r1 = base[0], r2 = base[1], type = base[2];
                        const limitIndex = ranks.indexOf(r2);
                        const startIndex = ranks.indexOf(r1) + 1;
                        // De la main la plus haute (ex: AQs) vers la plus basse du token (ex: AJs)
                        for (let i = startIndex; i <= limitIndex; i++) {
                            handsToUpdate.add(r1 + ranks[i] + type);
                        }
                    }
                } else {
                    handsToUpdate.add(cleanToken);
                }
            });
        
            const upserts = Array.from(handsToUpdate).map(h => ({ 
                user_id: user.id, hand: h, action: currentAction, 
                position: pos, situation: currentTab, 
                vs_position: vsPos, stack_depth: stack 
            }));
        
            const { error } = await sbClient.from('ranges').upsert(upserts);
        
            if (error) {
                console.error("Erreur:", error);
            } else {
                await refreshData(); // On attend la fin du rafraîchissement
                alert(`${upserts.length} mains affichées sur la grille !`);
                textarea.value = ""; // Optionnel : vide le champ après succès
            }
        }

        // --- SYNC ---
        async function updateHand(hand, action) {
            const { data: { user } } = await sbClient.auth.getUser();
            const vsPos = (currentTab === 'DEFENSE') ? document.getElementById('vsPosSelect').value : 'ANY';
            await sbClient.from('ranges').upsert({ user_id: user.id, hand, action, position: document.getElementById('posSelect').value, situation: currentTab, vs_position: vsPos, stack_depth: parseInt(document.getElementById('stackSelect').value) });
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('vsPosContainer').style.display = (tab === 'DEFENSE') ? 'block' : 'none';
            updateVsPosOptions(); refreshData();
        }

        function updateVsPosOptions() {
            const POSITION_ORDER = ["UTG", "UTG+1", "MP", "HJ", "CO", "BTN", "SB", "BB"];
            const myIndex = POSITION_ORDER.indexOf(document.getElementById('posSelect').value);
            let html = "";
            for (let i = 0; i < myIndex; i++) {
                if (POSITION_ORDER[i] === "SB") html += `<option value="SB">SB (Open)</option><option value="SB_LIMP">SB (Limp)</option>`;
                else html += `<option value="${POSITION_ORDER[i]}">${POSITION_ORDER[i]}</option>`;
            }
            document.getElementById('vsPosSelect').innerHTML = html || `<option value="ANY">ANY</option>`;
        }

        function applyPreset(sit, myPos, vsPos) {
            document.getElementById('posSelect').value = myPos;
            switchTab(sit);
            if(vsPos !== 'ANY') setTimeout(() => { document.getElementById('vsPosSelect').value = vsPos; refreshData(); }, 100);
        }

        function copyCurrentRange() {
            copiedData = Array.from(document.querySelectorAll('.cell')).filter(c => !c.classList.contains('fold')).map(c => ({ hand: c.dataset.hand, action: Array.from(c.classList).find(cls => cls.startsWith('action-')) }));
            document.getElementById('pasteBtn').style.display = 'block';
        }
        async function pasteRange() {
            const { data: { user } } = await sbClient.auth.getUser();
            const vsPos = (currentTab === 'DEFENSE') ? document.getElementById('vsPosSelect').value : 'ANY';
            const upserts = copiedData.map(d => ({ user_id: user.id, hand: d.hand, action: d.action, position: document.getElementById('posSelect').value, situation: currentTab, vs_position: vsPos, stack_depth: parseInt(document.getElementById('stackSelect').value) }));
            await sbClient.from('ranges').upsert(upserts); refreshData();
        }

        async function resetCurrentRange() {
            if (!confirm("Vider cette range ?")) return;
            const { data: { user } } = await sbClient.auth.getUser();
            const vsPos = (currentTab === 'DEFENSE') ? document.getElementById('vsPosSelect').value : 'ANY';
            await sbClient.from('ranges').delete().eq('user_id', user.id).eq('position', document.getElementById('posSelect').value).eq('situation', currentTab).eq('vs_position', vsPos).eq('stack_depth', parseInt(document.getElementById('stackSelect').value));
            refreshData();
        }

        async function signIn() {
            const { error } = await sbClient.auth.signInWithPassword({ email: document.getElementById('email').value, password: document.getElementById('password').value });
            if (error) alert(error.message);
        }

        let isCurrentRangeFinalized = false;

        async function toggleFinalize() {
            isCurrentRangeFinalized = !isCurrentRangeFinalized;
            
            const { data: { user } } = await sbClient.auth.getUser();
            const pos = document.getElementById('posSelect').value;
            const stack = document.getElementById('stackSelect').value;
            const vsPos = (currentTab === 'DEFENSE') ? document.getElementById('vsPosSelect').value : 'ANY';
        
            // On stocke cette info dans une table dédiée ou une colonne de ta table ranges
            // Ici, on va simplement mettre à jour l'UI et on pourrait créer une table 'range_status'
            updateFinalizeUI();
            
            // Sauvegarde dans Supabase (Table suggérée : range_status)
            await sbClient.from('ranges').upsert({
                user_id: user.id,
                position: pos,
                situation: currentTab,
                vs_position: vsPos,
                stack_depth: parseInt(stack),
                is_finalized: isCurrentRangeFinalized
            });
        }
        
        function updateFinalizeUI() {
            const btn = document.getElementById('btnFinalize');
            const icon = document.getElementById('finalizeIcon');
            const text = document.getElementById('finalizeText');
            
            if (isCurrentRangeFinalized) {
                btn.style.borderBottomColor = "#2ecc71";
                icon.innerText = "✅";
                text.innerText = "FINALISÉE";
                text.style.color = "#2ecc71";
            } else {
                btn.style.borderBottomColor = "#555";
                icon.innerText = "⚪";
                text.innerText = "BROUILLON";
                text.style.color = "#888";
            }
        }

        sbClient.auth.onAuthStateChange((event, session) => { if (session) { document.getElementById('login-overlay').style.display = 'none'; updateVsPosOptions(); refreshData(); } });
    </script>
</body>
</html>
