<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Playbook Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #121212; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .container { background: #1e1e1e; padding: 15px; border-radius: 12px; width: 100%; max-width: 500px; box-sizing: border-box; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; background: #2a2a2a; padding: 5px; border-radius: 8px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 13px; color: #888; }
        .tab.active { background: #3498db; color: white; }

        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        select { width: 100%; padding: 10px; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 6px; font-size: 13px; }

        .grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 2px; }
        .cell { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; cursor: pointer; border-radius: 2px; border: 1px solid rgba(255,255,255,0.03); }
        
        .fold { background: #2a2a2a; color: #555; }
        .action-blue { background: #3498db; color: white; }
        .action-green { background: #2ecc71; color: white; }
        .action-orange { background: #f39c12; color: white; }
        .action-purple { background: #9b59b6; color: white; }

        .palette { display: flex; gap: 5px; margin: 15px 0; }
        .tool { flex: 1; padding: 12px 5px; border-radius: 5px; cursor: pointer; border: 2px solid transparent; font-weight: bold; font-size: 10px; text-align: center; }
        .tool.active { border-color: white; }
        
        .quick-presets button { border: none; border-radius: 4px; font-size: 11px; cursor: pointer; transition: opacity 0.2s; }
        .quick-presets button:hover { opacity: 0.8; }

        #login-overlay { position: fixed; inset: 0; background: #121212; display: flex; align-items: center; justify-content: center; z-index: 100; flex-direction: column; gap: 15px; }
        input { padding: 12px; border-radius: 6px; border: 1px solid #333; width: 250px; background: #1e1e1e; color: white; }
        .status { font-size: 11px; color: #666; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h2>Poker Vault</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Mot de passe">
        <button onclick="signIn()" style="padding: 12px 100px; background: #3498db; border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: bold;">Connexion</button>
    </div>

    <div class="container">
        <div class="tabs">
            <div class="tab active" id="tab-RFI" onclick="switchTab('RFI')">MON OPEN (RFI)</div>
            <div class="tab" id="tab-DEFENSE" onclick="switchTab('DEFENSE')">DÉFENSE (Vs RFI)</div>
        </div>

        <div class="controls">
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <label style="font-size: 11px; color: #f39c12; font-weight: bold;">TAILLE DU STACK</label>
                <select id="stackSelect" onchange="refreshData()" style="border-color: #f39c12;">
                    <option value="100">100 BB</option>
                    <option value="80">80 BB</option>
                    <option value="60">60 BB</option>
                    <option value="40">40 BB</option>
                    <option value="30">30 BB</option>
                    <option value="20">20 BB</option>
                    <option value="14">14 BB</option>
                    <option value="10">10 BB</option>
                </select>
            </div>

            <div class="quick-presets" style="display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap;">
                <button onclick="applyPreset('RFI', 'BTN', 'ANY')" style="flex: 1.2; padding: 10px; background: #2980b9; color: white; font-weight: bold;">🔥 RFI BTN</button>
                <button onclick="applyPreset('DEFENSE', 'BB', 'SB_LIMP')" style="flex: 1; padding: 10px; background: #8e44ad; color: white;">🃏 BB vs SB LIMP</button>
                <button onclick="applyPreset('DEFENSE', 'BB', 'BTN')" style="flex: 1; padding: 10px; background: #34495e; color: #ecf0f1; border: 1px solid #7f8c8d;">🎯 BB vs BTN</button>
                <button onclick="applyPreset('DEFENSE', 'SB', 'BTN')" style="flex: 1; padding: 10px; background: #34495e; color: #ecf0f1; border: 1px solid #7f8c8d;">🎯 SB vs BTN</button>
                <button onclick="applyPreset('DEFENSE', 'SB', 'CO')" style="flex: 1; padding: 10px; background: #34495e; color: #ecf0f1; border: 1px solid #7f8c8d;">🎯 SB vs CO</button>
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <label style="font-size: 11px; color: #888;">MA POSITION</label>
                <select id="posSelect" onchange="updateVsPosOptions(); refreshData();">
                    <option value="UTG">UTG</option>
                    <option value="UTG+1">UTG+1</option>
                    <option value="MP">MP</option>
                    <option value="HJ">HJ</option>
                    <option value="CO">CO</option>
                    <option value="BTN">BTN</option>
                    <option value="SB">SB</option>
                    <option value="BB">BB</option>
                </select>
            </div>

            <div id="vsPosContainer" style="display: none; flex-direction: column; gap: 5px;">
                <label style="font-size: 11px; color: #e74c3c; font-weight: bold;">VS OPEN DE :</label>
                <select id="vsPosSelect" onchange="refreshData();">
                    </select>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button onclick="copyCurrentRange()" style="flex: 1; padding: 8px; background: #444; color: #fff; border: 1px solid #666; border-radius: 4px; font-size: 11px; cursor: pointer;">📋 Copier</button>
                <button id="pasteBtn" onclick="pasteRange()" style="flex: 1; padding: 8px; background: #27ae60; color: #fff; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; display: none;">📥 Coller</button>
            </div>
        </div>

        <div class="palette" id="palette">
            <div class="tool fold active" data-action="fold">FOLD</div>
            <div class="tool action-blue" id="btn-blue" data-action="action-blue">O-FOLD</div>
            <div class="tool action-green" id="btn-green" data-action="action-green">O-CALL</div>
            <div class="tool action-orange" id="btn-orange" data-action="action-orange">3/4-BET</div>
            <div class="tool action-purple" id="btn-purple" data-action="action-purple">ALL-IN</div>
        </div>

        <div id="statsPanel" style="display: flex; gap: 10px; margin-bottom: 10px; width: 100%;">
            <div style="flex: 1; background: #2a2a2a; padding: 10px; border-radius: 8px; text-align: center; border-bottom: 3px solid #3498db;">
                <span style="display: block; font-size: 10px; color: #888;">VPIP</span>
                <span id="statVPIP" style="font-size: 18px; font-weight: bold;">0.0%</span>
            </div>
            <div style="flex: 1; background: #2a2a2a; padding: 10px; border-radius: 8px; text-align: center; border-bottom: 3px solid #e74c3c;">
                <span style="display: block; font-size: 10px; color: #888;">PFR</span>
                <span id="statPFR" style="font-size: 18px; font-weight: bold;">0.0%</span>
            </div>
        </div>

        <div id="pokerGrid" class="grid"></div>
        <div id="status" class="status">Connecté</div>
        
        <button id="btnStartQuiz" onclick="toggleQuiz()" style="margin-top: 20px; width: 100%; padding: 12px; background: #f1c40f; color: #000; font-weight: bold; border-radius: 6px; border: none; cursor: pointer;">🎓 TESTER MES CONNAISSANCES</button>

        <div id="quizSection" style="display:none; background: #2c3e50; padding: 15px; border-radius: 10px; text-align: center; margin-top: 20px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 12px; color: #bdc3c7;">
                <span>Question : <b id="quizCount">1</b> / 20</span>
                <span>Score : <b id="quizScore">0</b> / 20</span>
            </div>
            <div style="width: 100%; height: 4px; background: #34495e; border-radius: 2px; margin-bottom: 15px;">
                <div id="quizProgress" style="width: 0%; height: 100%; background: #f1c40f; border-radius: 2px; transition: width 0.3s;"></div>
            </div>
            <h3 style="margin: 10px 0;">Action pour : <span id="quizHand" style="color: #f1c40f; font-size: 28px;">??</span></h3>
            <div style="display: flex; gap: 5px; margin-top: 15px; flex-wrap: wrap;">
                <button onclick="checkQuiz('fold')" style="flex:1; padding: 12px; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 5px;">FOLD / CHECK</button>
                <button onclick="checkQuiz('action-blue')" id="q-blue" style="flex:1; padding: 12px; background: #3498db; color: white; border-radius: 5px; border: none;">...</button>
                <button onclick="checkQuiz('action-green')" id="q-green" style="flex:1; padding: 12px; background: #2ecc71; color: white; border-radius: 5px; border: none;">...</button>
                <button onclick="checkQuiz('action-orange')" id="q-orange" style="flex:1; padding: 12px; background: #f39c12; color: white; border-radius: 5px; border: none;">...</button>
                <button onclick="checkQuiz('action-purple')" id="q-purple" style="flex:1; padding: 12px; background: #9b59b6; color: white; border-radius: 5px; border: none;">...</button>
            </div>
            <button onclick="toggleQuiz()" style="margin-top: 20px; background: none; color: #bdc3c7; border: 1px solid #7f8c8d; padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer;">Arrêter le Quiz</button>
        </div>
        
        <button onclick="resetCurrentRange()" style="margin-top: 10px; width: 100%; background: none; color: #666; border: none; font-size: 10px; cursor: pointer;">🗑️ Effacer cette range</button>
    </div>

    <script>
        const S_URL = 'https://mvncrfuuleirfainulqw.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12bmNyZnV1bGVpcmZhaW51bHF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNjY1MzQsImV4cCI6MjA4OTg0MjUzNH0.VnE7ttFDJmx5eb6oT3UBw-BvxRM_yuGT99vUocmehR0';
        const sbClient = supabase.createClient(S_URL, S_KEY);

        const ranks = ['A', 'K', 'Q', 'J', 'T', '9', '8', '7', '6', '5', '4', '3', '2'];
        let currentTab = 'RFI';
        let currentAction = 'fold';
        let quizActive = false;
        let score = 0;
        let questionsDone = 0;
        let currentQuizHand = "";
        let quizCorrectAction = "";

        const labels = {
            'RFI': { blue: 'O-FOLD', green: 'O-CALL', orange: '4-BET', purple: 'ALL-IN' },
            'DEFENSE': { blue: 'FOLD', green: 'CALL', orange: '3-BET', purple: 'ALL-IN' }
        };

        // --- INITIALISATION GRILLE ---
        const grid = document.getElementById('pokerGrid');
        for (let i = 0; i < 13; i++) {
            for (let j = 0; j < 13; j++) {
                let hand = (i < j) ? ranks[i]+ranks[j]+"s" : (i > j) ? ranks[j]+ranks[i]+"o" : ranks[i]+ranks[j];
                const cell = document.createElement('div');
                cell.className = 'cell fold';
                cell.textContent = hand;
                cell.dataset.hand = hand;
                cell.onclick = () => {
                    if(quizActive) return;
                    cell.className = 'cell ' + currentAction;
                    updateHand(hand, currentAction);
                    updateStats();
                };
                grid.appendChild(cell);
            }
        }

        // --- NAVIGATION & DONNÉES ---
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            
            const vsContainer = document.getElementById('vsPosContainer');
            if (vsContainer) vsContainer.style.display = (tab === 'DEFENSE') ? 'flex' : 'none';
            
            updateVsPosOptions();
            refreshData();
        }

        async function refreshData() {
            const pos = document.getElementById('posSelect').value;
            const stack = document.getElementById('stackSelect').value;
            const vsPos = (currentTab === 'DEFENSE') ? document.getElementById('vsPosSelect').value : 'ANY';

            updateDynamicLabels(pos, vsPos);
            
            document.querySelectorAll('.cell').forEach(c => c.className = 'cell fold');
            document.getElementById('status').innerText = "Sync...";

            const { data } = await sbClient.from('ranges')
                .select('*')
                .eq('position', pos)
                .eq('situation', currentTab)
                .eq('vs_position', vsPos)
                .eq('stack_depth', parseInt(stack));

            if (data) {
                data.forEach(row => {
                    const cell = document.querySelector(`[data-hand="${row.hand}"]`);
                    if (cell) cell.className = 'cell ' + row.action;
                });
            }
            updateStats();
            document.getElementById('status').innerText = `${pos} ${stack}BB Prêt`;
        }

        function updateDynamicLabels(pos, vsPos) {
            const btns = ['blue', 'green', 'orange', 'purple'];
            
            if (currentTab === 'DEFENSE' && pos === 'BB' && vsPos === 'SB_LIMP') {
                document.getElementById('btn-blue').innerText = "CHECK";
                document.getElementById('btn-green').innerText = "ISO 3.5x";
                document.getElementById('btn-orange').innerText = "ISO 6.5x";
                document.getElementById('btn-purple').innerText = "ISO AI";
            } else {
                btns.forEach(color => {
                    document.getElementById(`btn-${color}`).innerText = labels[currentTab][color];
                });
            }
            syncQuizLabels();
        }

        // --- QUIZ LOGIQUE ---
        function toggleQuiz() {
            quizActive = !quizActive;
            const quizDiv = document.getElementById('quizSection');
            const gridDiv = document.getElementById('pokerGrid');
            const btnStart = document.getElementById('btnStartQuiz');

            if (quizActive) {
                score = 0; questionsDone = 0;
                quizDiv.style.display = 'block';
                gridDiv.style.display = 'none';
                btnStart.style.display = 'none';
                syncQuizLabels();
                nextQuizHand();
            } else {
                quizDiv.style.display = 'none';
                gridDiv.style.display = 'grid';
                btnStart.style.display = 'block';
            }
        }

        function syncQuizLabels() {
            ['blue', 'green', 'orange', 'purple'].forEach(color => {
                const paletteText = document.getElementById(`btn-${color}`).innerText;
                const quizBtn = document.getElementById(`q-${color}`);
                if(quizBtn) quizBtn.innerText = paletteText;
            });
        }

        function nextQuizHand() {
            if (questionsDone >= 20) { finishQuiz(); return; }
            
            const allHands = Array.from(document.querySelectorAll('.cell')).map(c => c.dataset.hand);
            currentQuizHand = allHands[Math.floor(Math.random() * allHands.length)];
            document.getElementById('quizHand').innerText = currentQuizHand;
            
            const cell = document.querySelector(`[data-hand="${currentQuizHand}"]`);
            quizCorrectAction = Array.from(cell.classList).find(cls => cls.startsWith('action-') || cls === 'fold') || 'fold';
            
            document.getElementById('quizCount').innerText = questionsDone + 1;
            document.getElementById('quizScore').innerText = score;
            document.getElementById('quizProgress').style.width = (questionsDone / 20 * 100) + "%";
        }

        function checkQuiz(userAction) {
            const quizBox = document.getElementById('quizSection');
            if (userAction === quizCorrectAction) {
                score++;
                quizBox.style.background = "#1e8449";
            } else {
                quizBox.style.background = "#922b21";
                const colorKey = quizCorrectAction.replace('action-', '');
                const correctLabel = (colorKey === 'fold') ? "FOLD / CHECK" : document.getElementById(`btn-${colorKey}`).innerText;
                alert(`Faux ! Pour ${currentQuizHand}, l'action était : ${correctLabel}`);
            }
            questionsDone++;
            setTimeout(() => {
                quizBox.style.background = "#2c3e50";
                nextQuizHand();
            }, 200);
        }

        function finishQuiz() {
            alert(`Test terminé ! Score : ${score} / 20`);
            toggleQuiz();
        }

        // --- HELPER FUNCTIONS (Copy, Stats, Presets, DB) ---
        const POSITION_ORDER = ["UTG", "UTG+1", "MP", "HJ", "CO", "BTN", "SB", "BB"];
        
        function updateVsPosOptions() {
            const myPos = document.getElementById('posSelect').value;
            const vsSelect = document.getElementById('vsPosSelect');
            const myIndex = POSITION_ORDER.indexOf(myPos);
            let html = "";
            for (let i = 0; i < myIndex; i++) {
                if (POSITION_ORDER[i] === "SB") {
                    html += `<option value="SB">SB (vs Open)</option><option value="SB_LIMP">SB (vs Limp)</option>`;
                } else {
                    html += `<option value="${POSITION_ORDER[i]}">${POSITION_ORDER[i]}</option>`;
                }
            }
            vsSelect.innerHTML = html || `<option value="ANY">ANY</option>`;
        }

        function applyPreset(situation, myPos, vsPos) {
            switchTab(situation);
            document.getElementById('posSelect').value = myPos;
            updateVsPosOptions();
            document.getElementById('vsPosSelect').value = vsPos;
            refreshData();
        }

        async function updateHand(hand, action) {
            const { data: { user } } = await sbClient.auth.getUser();
            if (!user) return;
            const pos = document.getElementById('posSelect').value;
            const stack = document.getElementById('stackSelect').value;
            const vsPos = (currentTab === 'DEFENSE') ? document.getElementById('vsPosSelect').value : 'ANY';
            await sbClient.from('ranges').upsert({ user_id: user.id, hand, action, position: pos, situation: currentTab, vs_position: vsPos, stack_depth: parseInt(stack) });
        }

        function updateStats() {
            const cells = document.querySelectorAll('.cell');
            let total = 0, played = 0, aggro = 0;
            cells.forEach(c => {
                const h = c.dataset.hand;
                let w = h.includes('s') ? 4 : (h.includes('o') ? 12 : 6);
                total += w;
                if (!c.classList.contains('fold')) played += w;
                if (c.classList.contains('action-orange') || c.classList.contains('action-purple')) aggro += w;
            });
            document.getElementById('statVPIP').innerText = (played/total*100).toFixed(1) + "%";
            document.getElementById('statPFR').innerText = (aggro/total*100).toFixed(1) + "%";
        }

        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await sbClient.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
        }

        sbClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('login-overlay').style.display = 'none';
                updateVsPosOptions();
                refreshData();
            }
        });

        // Palette click
        document.querySelectorAll('.tool').forEach(tool => {
            tool.addEventListener('click', () => {
                document.querySelectorAll('.tool').forEach(t => t.classList.remove('active'));
                tool.classList.add('active');
                currentAction = tool.dataset.action;
            });
        });
        
        // Copier/Coller (simplifié)
        let copiedData = null;
        function copyCurrentRange() {
            copiedData = Array.from(document.querySelectorAll('.cell'))
                .filter(c => !c.classList.contains('fold'))
                .map(c => ({ hand: c.dataset.hand, action: Array.from(c.classList).find(cls => cls.startsWith('action-')) }));
            document.getElementById('pasteBtn').style.display = 'block';
            document.getElementById('status').innerText = "Copié !";
        }
        async function pasteRange() {
            if(!copiedData || !confirm("Écraser la range actuelle ?")) return;
            const { data: { user } } = await sbClient.auth.getUser();
            const upserts = copiedData.map(d => ({
                user_id: user.id, hand: d.hand, action: d.action,
                position: document.getElementById('posSelect').value,
                situation: currentTab,
                vs_position: (currentTab === 'DEFENSE') ? document.getElementById('vsPosSelect').value : 'ANY',
                stack_depth: parseInt(document.getElementById('stackSelect').value)
            }));
            await sbClient.from('ranges').upsert(upserts);
            refreshData();
        }
    </script>
</body>
</html>
